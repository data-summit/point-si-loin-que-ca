<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,300;1,300&display=swap');
    body {
      font-family: Georgia, serif;
      background: #fafaf8;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .box {
      text-align: center;
      max-width: 400px;
      padding: 32px;
    }
    h1 {
      font-family: 'Source Serif 4', Georgia, serif;
      font-weight: 300;
      font-style: italic;
      font-size: 64px;
      margin: 0 0 8px;
      color: #111;
    }
    p {
      color: #666;
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 24px;
    }
    a {
      display: inline-block;
      padding: 8px 20px;
      background: #111;
      color: #fff;
      text-decoration: none;
      font-family: Arial, sans-serif;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    a:hover { opacity: 0.75; }
  </style>
</head>
<body>
  <div class="box">
    <h1>404</h1>
    <p>Cette page n'existe pas — ou peut-être est-ce l'endroit le plus isolé du site.</p>
    <a href="/point-si-loin-que-ca">← Retour à l'accueil</a>
  </div>
</body>
</html>
